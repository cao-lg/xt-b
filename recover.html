<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法宝找回 · 东皇钟</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 20px; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background: #14110f; color: #e8e0d4; line-height: 1.6; }
  h1 { font-size: 22px; color: #f0c674; margin: 0 0 8px; }
  .card { background: #1f1a16; border: 1px solid #3a3026; border-radius: 12px; padding: 18px; margin-top: 14px; }
  p { font-size: 14px; color: #b8ad9c; margin: 8px 0; }
  #status { font-size: 15px; color: #8fd6a0; font-weight: 600; min-height: 22px; }
  label { display: block; margin: 14px 0 6px; font-size: 14px; color: #cdbfa6; }
  input { width: 90px; padding: 8px 10px; font-size: 16px; border-radius: 8px; border: 1px solid #4a3d2e;
          background: #2a231c; color: #fff; }
  button { display: block; width: 100%; padding: 14px; margin-top: 14px; font-size: 17px; font-weight: 700;
           border: none; border-radius: 10px; cursor: pointer; }
  #go { background: linear-gradient(135deg,#c9962f,#f0c674); color: #2a1d05; }
  #back { background: #3a3026; color: #e8e0d4; }
  #msg { min-height: 20px; color: #f0c674; font-weight: 600; }
  .hint { font-size: 12px; color: #8a7f6c; margin-top: 16px; }
</style>
</head>
<body>
  <h1>🔔 法宝找回 · 东皇钟</h1>
  <div class="card">
    <p>本工具只读取并修改你<strong>本机浏览器</strong>的游戏存档（与游戏同源），不会上传任何数据。用来恢复误删的「东皇钟」。</p>
    <div id="status">检测中…</div>
    <label>恢复等级（1–20，默认满级 20）：</label>
    <input id="lv" type="number" min="1" max="20" value="20">
    <button id="go">恢复东皇钟并装备</button>
    <button id="back">返回游戏</button>
    <p id="msg"></p>
  </div>
  <p class="hint">用法：用手机浏览器打开本页（与游戏同一网址，仅把地址末尾的 index.html 换成 recover.html），点上面按钮即可。恢复后点「返回游戏」刷新查看。</p>

  <script>
    const KEY = 'xiuxian_save_v2';
    function read() { try { return JSON.parse(localStorage.getItem(KEY) || 'null'); } catch (e) { return null; } }
    function show() {
      const d = read();
      const st = document.getElementById('status');
      if (!d) { st.textContent = '未检测到存档，请先用手机打开一次游戏页面，再回来本页。'; st.style.color = '#e08a8a'; return; }
      const t = d.treasures && d.treasures.donghuang;
      st.textContent = t ? ('当前东皇钟：持有 ' + t.count + ' 件，强化 ' + t.level + ' 级')
                         : '当前未持有东皇钟（可直接恢复）。';
      st.style.color = '#8fd6a0';
    }
    document.getElementById('go').onclick = function () {
      const d = read();
      if (!d) { alert('未检测到存档，请先打开一次游戏。'); return; }
      d.treasures = d.treasures || {};
      d.equipped = d.equipped || {};
      let lv = parseInt(document.getElementById('lv').value, 10);
      if (!(lv >= 1 && lv <= 20)) lv = 20;
      d.treasures.donghuang = { count: 1, level: lv };
      d.equipped.weapon = 'donghuang';
      localStorage.setItem(KEY, JSON.stringify(d));
      document.getElementById('msg').textContent = '✅ 已恢复东皇钟（强化 ' + lv + ' 级）并已装备，点「返回游戏」刷新即可看到。';
      show();
    };
    document.getElementById('back').onclick = function () { location.href = 'index.html'; };
    show();
  </script>
</body>
</html>
